<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>埋め込みURL表示サイト</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .controls { margin-bottom: 20px; }
        input { padding: 10px; width: 300px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; }
        
        /* サイトを表示する枠のスタイル */
        #siteViewer {
            width: 90%;
            height: 500px; /* 表示する高さ */
            margin: 0 auto;
            border: 2px solid #ddd;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

    <h1>サイトビューアー</h1>
    
    <div class="controls">
        <input type="text" id="urlInput" placeholder="https://example.com">
        <button onclick="displaySite()">ここで開く</button>
    </div>

    <!-- サイトを表示するための枠（iframe） -->
    <iframe id="siteViewer" src="about:blank"></iframe>

    <script>
        function displaySite() {
            let url = document.getElementById('urlInput').value;

            if (url) {
                // URLの整形（httpから始まっていない場合）
                if (!url.startsWith('http://') && !url.startsWith('https://')) {
                    url = 'https://' + url;
                }
                
                // iframeのsrc属性を書き換えてサイトを表示
                document.getElementById('siteViewer').src = url;
            } else {
                alert('URLを入力してください');
            }
        }
    </script>

</body>
</html>

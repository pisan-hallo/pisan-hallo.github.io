<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>タブ内全画面表示</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #controls { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; }
        input { padding: 5px; width: 250px; }
        iframe { width: 100vw; height: 100vh; border: none; display: none; }
    </style>
</head>
<body>

    <div id="controls">
        <input type="text" id="urlInput" placeholder="https://example.com">
        <button onclick="loadSite()">この画面で開く</button>
    </div>

    <iframe id="siteFrame"></iframe>

    <script>
        function loadSite() {
            let url = document.getElementById('urlInput').value;
            if (url) {
                if (!url.startsWith('http')) url = 'https://' + url;
                
                const frame = document.getElementById('siteFrame');
                frame.src = url;
                frame.style.display = 'block';
                
                // 全画面化を試みる
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                }
            }
        }
    </script>
</body>
</html>
